<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            --tg-theme-bg-color: #fff;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            font-family: sans-serif;
            display: flex; flex-direction: column; align-items: center; padding: 20px;
        }
        input {
            width: 100%; margin: 10px 0; padding: 12px;
            border: 1px solid #ccc; border-radius: 8px;
        }
        button {
            width: 100%; padding: 12px; background: #248bcf;
            color: white; border: none; border-radius: 8px; font-weight: bold;
        }
    </style>
</head>
<body>
    <h3>Добавить именинника</h3>
    <input type="text" id="name" placeholder="Имя друга">
    <input type="date" id="bday">
    <button onclick="sendData()">Сохранить</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function sendData() {
            const name = document.getElementById('name').value;
            const bday = document.getElementById('bday').value;
            
            if(!name || !bday) return alert("Заполни все поля!");

            const data = { name, bday };
            tg.sendData(JSON.stringify(data)); // Отправляет строку боту
        }
    </script>
</body>
</html>
