<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="tabs">
        <button onclick="showTab('add')">Добавить</button>
        <button onclick="showTab('list')">Список</button>
    </div>

    <div id="add-tab" class="tab-content">
        <input type="text" id="name" placeholder="Имя друга">
        <input type="date" id="date">
        <button onclick="saveFriend()">Сохранить</button>
    </div>

    <div id="list-tab" class="tab-content" style="display:none;">
        <div id="friends-list">Загрузка...</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
