<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            --tg-theme-bg-color: #fff;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            font-family: sans-serif;
            display: flex; flex-direction: column; align-items: center; padding: 20px;
        }
        input {
            width: 100%; margin: 10px 0; padding: 12px;
            border: 1px solid #ccc; border-radius: 8px;
        }
        button {
            width: 100%; padding: 12px; background: #248bcf;
            color: white; border: none; border-radius: 8px; font-weight: bold;
            :root {
  --bg: var(--tg-theme-bg-color, #ffffff);
  --text: var(--tg-theme-text-color, #222222);
  --hint: var(--tg-theme-hint-color, #999999);
  --button: var(--tg-theme-button-color, #248bcf);
  --button-text: var(--tg-theme-button-text-color, #ffffff);
}

body {
  background-color: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  margin: 0; padding: 20px;
  display: flex; flex-direction: column; gap: 15px;
}

.card {
  background: var(--tg-theme-secondary-bg-color, #f4f4f5);
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.05);
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 5px;
  border: 1px solid var(--hint);
  border-radius: 10px;
  background: var(--bg);
  color: var(--text);
  box-sizing: border-box;
}

button {
  background-color: var(--button);
  color: var(--button-text);
  border: none;
  padding: 15px;
  border-radius: 10px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
}

button:active { opacity: 0.8; }
        }
    </style>
</head>
<body>
    <h3>Добавить именинника</h3>
    <input type="text" id="name" placeholder="Имя друга">
    <input type="date" id="bday">
    <button onclick="sendData()">Сохранить</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function sendData() {
            const name = document.getElementById('name').value;
            const bday = document.getElementById('bday').value;
            
            if(!name || !bday) return alert("Заполни все поля!");

            const data = { name, bday };
            tg.sendData(JSON.stringify(data)); // Отправляет строку боту
        }
    </script>
</body>
</html>
